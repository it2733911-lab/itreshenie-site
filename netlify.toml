[build]
  publish = "."

# Отключаем всё что может ломать JS и HTML
[build.processing]
  skip_processing = true

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.html]
  pretty_urls = false

[build.processing.images]
  compress = false

# Редиректы для городских страниц
[[redirects]]
  from = "/rostov"
  to = "/rostov/"
  status = 301

[[redirects]]
  from = "/bataisk"
  to = "/bataisk/"
  status = 301

[[redirects]]
  from = "/aksai"
  to = "/aksai/"
  status = 301

# Заголовки безопасности
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
